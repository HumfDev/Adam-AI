# Seeed Studio XIAO RP2040 — Klipper sensor MCU (merge into printer.cfg)
#
# Flash Klipper for this board:
#   make menuconfig  →  Micro-controller: Raspberry Pi RP2040
#                    →  Communication: USB (typical)
#   make clean && make
# Bootloader: hold BOOT, USB in, drag out/klipper.uf2 onto RPI-RP2.
#
# Serial on the Pi / Linux PC:
#   ls -l /dev/serial/by-id/
#
# udev — give the XIAO a permanent device name so printer.cfg never breaks
# when you replug or change USB ports:
#
#   1. Find your XIAO's idVendor/idProduct:
#        udevadm info -a -n /dev/ttyACM0 | grep -E 'idVendor|idProduct|serial'
#      Seeed XIAO RP2040 is typically: idVendor=="2886", idProduct=="002d"
#
#   2. Create /etc/udev/rules.d/99-bio-sensors.rules with:
#        SUBSYSTEM=="tty", ATTRS{idVendor}=="2886", ATTRS{idProduct}=="002d", \
#          ATTRS{serial}=="<YOUR_SERIAL>", SYMLINK+="bio_sensors", MODE="0660", \
#          GROUP="dialout"
#      (omit ATTRS{serial} if you only ever have one XIAO connected)
#
#   3. Reload: sudo udevadm control --reload-rules && sudo udevadm trigger
#
#   4. Update [mcu xiao] serial to: /dev/bio_sensors
#
# XIAO castellated pins → RP2040 GPIO (Klipper names: gpio0 … gpio29):
#   D0–D3  → gpio26, gpio27, gpio28, gpio29  (ADC capable)
#   D4/D5  → gpio6 / gpio7                  (I2C; 3.3 V only)
#   D6/D7  → gpio0 / gpio1                  (UART)
#   D8–D10 → gpio2, gpio4, gpio3            (SPI)
#
# Typical wiring:
#   HX711 DOUT → D0 (gpio26), PD_SCK → D1 (gpio27) — leave UART free or pick other pins.
#   ADS1115: wire SDA→D4 (gpio6), SCL→D5 (gpio7) on the XIAO.
#   Use i2c_mcu: xiao so Klipper talks I2C through the XIAO, not the Linux host.
#
# ---------------------------------------------------------------------------
# Add a second MCU for sensors (recommended — keep your printer’s [mcu] as-is):
#
# [mcu xiao]
# serial: /dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXX-if00
#
# [hx711 loadcell1]
# dout_pin: xiao:^gpio26
# sck_pin: xiao:gpio27
# gain: 128
# report_time: 0.5
# offset: 0        # fill in after step 1 of calibration below
# scale: 1         # fill in after step 2 of calibration below
#
# Load-cell calibration (do this once before using the Layer 2 Classifier):
#   The model needs real force units (grams), not raw ADC counts.
#
#   Step 1 — tare at no load (bed empty, nozzle clear of the platform):
#     CALIBRATE_GRAMS GRAMS=0
#     → Klipper prints the raw offset; paste it into `offset:` above.
#
#   Step 2 — span with a known weight (e.g. place a 200 g calibration mass):
#     CALIBRATE_GRAMS GRAMS=200
#     → Klipper prints the raw counts for that mass; paste into `scale:` above.
#       (scale = raw_counts_per_gram = (reading - offset) / known_grams)
#
#   Step 3 — verify:
#     CALIBRATE_GRAMS GRAMS=100   # use a second known mass; reported value should match
#
#   Tip: re-run whenever you change the mounting, springs, or HX711 gain.
#
# ---------------------------------------------------------------------------
# If the XIAO is your *only* MCU, use the same pin names without the prefix:
#
# [mcu]
# serial: /dev/serial/by-id/usb-Klipper_rp2040_XXXXXXXXX-if00
#
# [hx711 loadcell1]
# dout_pin: ^gpio26
# sck_pin: gpio27
# gain: 128
# report_time: 0.5
#
# You still need a valid [printer] + motion sections for your machine; the XIAO
# does not have enough broken-out GPIO for a typical 3D printer without expansion.
#
# ---------------------------------------------------------------------------
# ADS1115 on the XIAO's I2C bus (SDA→D4/gpio6, SCL→D5/gpio7):

[ads1115_sensor thermistor1]
i2c_mcu: xiao
i2c_bus: i2c1a          # RP2040 I2C1 on gpio6/gpio7
i2c_address: 72         # 0x48 — ADDR pin tied to GND
channel: 0   # A0

[ads1115_sensor thermistor2]
i2c_mcu: xiao
i2c_bus: i2c1a
i2c_address: 72
channel: 1   # A1

[temperature_sensor voltage_reading]
sensor_type: ADS1115

[gcode_macro READ_SENSOR]
gcode:
  {action_respond_info("ADS1115 A0: %s V | A1: %s V" % (printer["ads1115_sensor thermistor1"].temperature, printer["ads1115_sensor thermistor2"].temperature))}

[gcode_macro READ_LOADCELL]
gcode:
  {action_respond_info("HX711 raw: %s" % (printer["hx711 loadcell1"].raw,))}
